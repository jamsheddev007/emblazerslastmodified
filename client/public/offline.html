<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0D7377" />
  <title>Offline - Emblazers SMS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1A2B4A 0%, #0D4F52 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 40px;
      height: 40px;
      stroke: #0D7377;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      font-weight: 600;
    }
    p {
      color: rgba(255,255,255,0.7);
      line-height: 1.6;
      margin-bottom: 1rem;
    }
    .status-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 1.25rem;
      margin-top: 1.5rem;
    }
    .status-card h3 {
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #0D7377;
      margin-bottom: 0.75rem;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 0.875rem;
    }
    .status-item:first-of-type { border-top: none; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.pending { background: #f59e0b; }
    .dot.cached { background: #10b981; }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: #0D7377;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 500;
    }
    .retry-btn:hover { background: #0a5c5f; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry — any data you submit will be saved and synced automatically when you're back online.</p>

    <div class="status-card" id="cachedData">
      <h3>Cached Data Available</h3>
      <div id="cacheStatus"></div>
    </div>

    <button class="retry-btn" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      Try Again
    </button>
  </div>

  <script>
    (async function() {
      const statusEl = document.getElementById('cacheStatus');
      const cardEl = document.getElementById('cachedData');
      try {
        const cache = await caches.open('emblazers-pages-v1');
        const keys = await cache.keys();
        if (keys.length === 0) {
          cardEl.style.display = 'none';
          return;
        }
        const pages = keys.map(k => {
          const url = new URL(k.url);
          return url.pathname;
        }).filter(p => p !== '/offline.html');
        if (pages.length === 0) {
          cardEl.style.display = 'none';
          return;
        }
        statusEl.innerHTML = pages.map(p =>
          '<div class="status-item"><span>' + p + '</span><span class="dot cached"></span></div>'
        ).join('');
      } catch(e) {
        cardEl.style.display = 'none';
      }
    })();
  </script>
</body>
</html>
